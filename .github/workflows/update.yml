name: update-ssq-data

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/update.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest data
        run: python3 scripts/fetch_ssq.py
        shell: bash

      - name: Verify JSON
        run: |
          python3 -c "import json; d=json.load(open('data/history.json')); assert d['count']>0, 'empty'; assert d['data'][0]['issue']>=26000, 'stale'; print('OK latest issue =', d['data'][0]['issue'], 'count =', d['count'])"
        shell: bash

      - name: Commit & push via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 用 GitHub Contents API 提交，绕开 git push 的分支历史问题
          python3 <<'PYEOF'
          import os, json, base64, urllib.request

          token = os.environ['GH_TOKEN']
          repo = 'cdszeyao/ssq-tool'
          path = 'data/history.json'
          api_base = f'https://api.github.com/repos/{repo}/contents/{path}'

          with open(path, 'rb') as f:\n              content_b64 = base64.b64encode(f.read()).decode('ascii')\n\n          with open(path, 'r', encoding='utf-8') as f:\n              data = json.load(f)\n          issue = data['data'][0]['issue']\n          date = data['updated']\n\n          # 拿当前 sha\n          req = urllib.request.Request(api_base, headers={'Authorization': f'token {token}', 'User-Agent': 'ssq-bot/1.0'})
          with urllib.request.urlopen(req) as r:\n              cur = json.loads(r.read())\n          sha = cur.get('sha')\n\n          # 内容相同时跳过\n          if cur.get('content', '').replace('\n', '') == content_b64:
              print('No changes to commit (content identical)')
              raise SystemExit(0)

          payload = {
              'message': f'chore(data): update SSQ history to issue {issue} ({date})',
              'content': content_b64,
          }
          if sha:
              payload['sha'] = sha

          req = urllib.request.Request(
              api_base,
              data=json.dumps(payload).encode('utf-8'),
              headers={'Authorization': f'token {token}', 'Content-Type': 'application/json', 'User-Agent': 'ssq-bot/1.0'},
              method='PUT',
          )
          with urllib.request.urlopen(req) as r:\n              result = json.loads(r.read())\n          print(f"OK committed issue {issue}, commit {result['commit']['sha'][:10]}")
          PYEOF
        shell: bash
