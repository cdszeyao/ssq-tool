name: update-ssq-data

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/update.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest data
        run: python3 scripts/fetch_ssq.py
        shell: bash

      - name: Verify JSON
        run: |
          python3 -c "import json; d=json.load(open('data/history.json')); assert d['count']>0, 'empty'; assert d['data'][0]['issue']>=26000, 'stale'; print('OK latest issue =', d['data'][0]['issue'], 'count =', d['count'])"
        shell: bash

      - name: Commit & push
        run: |
          git config user.name "ssq-bot"
          git config user.email "ssq-bot@users.noreply.github.com"
          git add data/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          ISSUE=$(python3 -c "import json; print(json.load(open('data/history.json'))['data'][0]['issue'])")
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "chore(data): update SSQ history to issue $ISSUE ($DATE)"
          # 拉远端再 push（处理外部 commit）
          git fetch origin main
          git rebase origin/main || git merge origin/main --no-edit
          git push origin main
        shell: bash
