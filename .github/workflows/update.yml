name: update-ssq-data

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/update.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest data
        run: python3 scripts/fetch_ssq.py
        shell: bash

      - name: Verify JSON
        run: |
          python3 -c "import json; d=json.load(open('data/history.json')); assert d['count']>0, 'empty'; assert d['data'][0]['issue']>=26000, 'stale'; print('OK latest issue =', d['data'][0]['issue'], 'count =', d['count'])"
        shell: bash

      - name: Push via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/push_api.py << 'PYEOF'
          import os, json, base64, urllib.request
          token = os.environ['GH_TOKEN']
          repo = 'cdszeyao/ssq-tool'
          path = 'data/history.json'
          api_base = f'https://api.github.com/repos/{repo}/contents/{path}'
          with open(path, 'rb') as f: content_b64 = base64.b64encode(f.read()).decode('ascii')
          with open(path, 'r', encoding='utf-8') as f: data = json.load(f)
          issue = data['data'][0]['issue']
          date = data['updated']
          req = urllib.request.Request(api_base, headers={'Authorization': f'token {token}', 'User-Agent': 'ssq-bot/1.0'})
          with urllib.request.urlopen(req) as r: cur = json.loads(r.read())
          sha = cur.get('sha')
          if cur.get('content', '').replace(chr(10), '') == content_b64:
              print('No changes to commit (content identical)')
              raise SystemExit(0)
          payload = {'message': f'chore(data): update SSQ history to issue {issue} ({date})', 'content': content_b64}
          if sha: payload['sha'] = sha
          req = urllib.request.Request(api_base, data=json.dumps(payload).encode('utf-8'), headers={'Authorization': f'token {token}', 'Content-Type': 'application/json', 'User-Agent': 'ssq-bot/1.0'}, method='PUT')
          with urllib.request.urlopen(req) as r: result = json.loads(r.read())
          print(f"OK committed issue {issue}, commit {result['commit']['sha'][:10]}")
          PYEOF
          python3 /tmp/push_api.py
        shell: bash
